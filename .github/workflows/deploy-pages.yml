name: CD - 部署前端到 GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

# 设置 GitHub Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时运行一个部署，不排队
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: 构建前端（Demo 模式）
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 安装依赖
        working-directory: apps/frontend
        run: pnpm install

      - name: 构建（使用 Demo API）
        working-directory: apps/frontend
        run: pnpm build
        env:
          # GitHub Pages 模式：使用 mock 数据
          VITE_DEMO_MODE: 'true'
          VITE_BASE_URL: '/clawbook'

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

  deploy:
    name: 部署到 GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4

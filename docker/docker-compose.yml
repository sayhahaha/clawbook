version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - clawbook-net

  # 后端 NestJS 服务
  backend:
    build:
      context: ../apps/backend
      dockerfile: ../../docker/Dockerfile.backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://clawbook:clawbook123@postgres:5432/clawbook
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-clawbook-jwt-secret-change-me}
      - ALLOWED_ORIGINS=http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - clawbook-net

  # 前端构建（编译后放入 nginx 卷）
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    volumes:
      - frontend_dist:/dist
    environment:
      - VITE_API_BASE_URL=/api

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=clawbook
      - POSTGRES_USER=clawbook
      - POSTGRES_PASSWORD=clawbook123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawbook"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clawbook-net

  # Redis 缓存
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - clawbook-net

volumes:
  pgdata:
  redisdata:
  frontend_dist:

networks:
  clawbook-net:
    driver: bridge
